<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Made by Matheus Rocha</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>

  <section class="hero">
    <h1 class="hero-title">A CURATED REPOSITORY OF<br>DESIGN & RESOURCES</h1>
    <p class="hero-sub">SELECTED REFERENCES BY <span class="hero-accent">MATHEUS ROCHA.</span></p>
  </section>

  <div class="container">

    <header class="topbar">
      <button class="sort-btn version" data-sort="type">type</button>
      <nav class="sort-controls">
        <button class="sort-btn" data-sort="name">name</button>
      </nav>
      <button class="search-btn" id="searchToggle">search</button>
    </header>

    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="search links..." autocomplete="off">
    </div>

    <main class="table-wrapper">
      <table id="linksTable">
        <tbody id="tableBody"></tbody>
      </table>
    </main>


  </div>

  <!-- Desktop hover preview -->
  <div class="preview" id="preview">
    <img id="previewImg" src="" alt="preview">
  </div>

  <!-- Mobile scroll preview -->
  <div id="mob-preview"></div>

  <script src="main.js"></script>
</body>
</html>
